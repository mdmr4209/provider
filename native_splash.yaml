flutter_native_splash:
  color: "#FCEDEA"
  image: "assets/image/logo2.png"

  # This allows the splash to use the full screen area
  fullscreen: true

  # On older Android versions, this stretches the image
  android_gravity: fill
  # On iOS, this stretches the image
  ios_content_mode: scaleAspectFill

  android_12:
    color: "#FCEDEA"
    image: "assets/image/logo.png"
    icon_background_color: "#FCEDEA"

  web: true