name: newproject
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State management ───────────────────────────────────────────────────────
  provider: 6.1.5+1

  # ── Routing ────────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Networking (Dio replaces http) ─────────────────────────────────────────
  dio: ^5.9.0

  # ── UI helpers ─────────────────────────────────────────────────────────────
  pin_code_fields: ^8.0.1
  flutter_svg: ^2.2.1
  flutter_screenutil: ^5.9.3

  # ── Storage ────────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4

  # ── Firebase / Social ──────────────────────────────────────────────────────
  firebase_core: ^4.0.0
  firebase_auth: 6.0.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.2

  # ── Fonts ──────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  http: ^1.5.0
  http_parser: ^4.1.2
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^7.0.1
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1
  file_picker: ^10.3.3
  intl: ^0.20.2
  web_socket_channel: ^3.0.3
  google_nav_bar: ^5.0.7
  firebase_messaging: 16.0.0
  flutter_local_notifications: 19.3.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1
  rename: ^3.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_background: "#1F291E"
  remove_alpha_ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: LobsterTwo
      fonts:
        - asset: assets/fonts/LobsterTwo-Regular.ttf
    - family: Segoe UI
      fonts:
        - asset: assets/fonts/Segoe UI.ttf
    - family: Georgia
      fonts:
        - asset: assets/fonts/georgia.ttf
